<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#009245">
    <title>SOGE ZABANA RH</title>
    <style>
        :root{
            --primary:#009245;
            --primary-dark:#007a38;
            --white:#FFF;
            --bg:#f5f6fa;
            --text:#1a1a2e;
            --text-light:#666;
            --border:#e0e0e0;
            --shadow:0 4px 20px rgba(0,0,0,0.08);
            --radius:16px;
        }
        [data-theme="dark"]{
            --white:#1a1a2e;
            --bg:#0f0f1a;
            --text:#e0e0e0;
            --text-light:#aaa;
            --border:#2a2a3e;
            --shadow:0 4px 20px rgba(0,0,0,0.3);
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
        
        .header{background:var(--white);padding:12px 20px;position:sticky;top:0;z-index:1000;box-shadow:0 2px 15px rgba(0,0,0,0.06);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
        .logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--primary);font-weight:800;font-size:18px;cursor:pointer}
        .logo-icon{width:40px;height:40px;background:var(--primary);border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:16px}
        
        .btn{padding:10px 20px;border:none;border-radius:12px;cursor:pointer;font-weight:600;font-size:13px;transition:all .3s;display:inline-flex;align-items:center;gap:6px}
        .btn-primary{background:var(--primary);color:#fff}
        .btn-primary:hover{background:var(--primary-dark);transform:translateY(-2px)}
        .btn-outline{background:transparent;border:2px solid var(--primary);color:var(--primary)}
        .btn-outline:hover{background:var(--primary);color:#fff}
        .btn-danger{background:#e74c3c;color:#fff}
        
        .hero{background:linear-gradient(135deg,var(--primary),#006b30);padding:40px 20px;text-align:center;color:#fff;border-radius:0 0 30px 30px}
        .search-box{display:flex;max-width:550px;margin:0 auto;background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 8px 30px rgba(0,0,0,0.15)}
        .search-box input{flex:1;padding:14px 18px;border:none;font-size:14px;outline:0;color:#333}
        .search-box button{background:var(--primary);color:#fff;border:none;padding:14px 22px;cursor:pointer;font-weight:700}
        
        .container{max-width:1200px;margin:auto;padding:20px}
        .tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
        .tab{padding:10px 20px;background:var(--white);border-radius:12px;cursor:pointer;font-weight:600;border:2px solid transparent}
        .tab.active{background:var(--primary);color:#fff}
        
        .ads-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px}
        .ad-card{background:var(--white);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);cursor:pointer;transition:.3s}
        .ad-card:hover{transform:translateY(-4px);box-shadow:0 12px 30px rgba(0,0,0,0.12)}
        .ad-image{width:100%;height:160px;background:#e8e8e8;display:flex;align-items:center;justify-content:center;overflow:hidden}
        .ad-image img{width:100%;height:100%;object-fit:cover}
        .fav-btn{position:absolute;top:10px;right:10px;background:rgba(255,255,255,0.95);border:none;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:18px;box-shadow:0 2px 8px rgba(0,0,0,0.15)}
        
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:2000;align-items:center;justify-content:center;padding:20px}
        .modal.active{display:flex}
        .modal-content{background:var(--white);border-radius:20px;padding:30px;max-width:480px;width:100%;max-height:90vh;overflow-y:auto}
        
        .toast-container{position:fixed;bottom:20px;right:20px;z-index:3000;display:flex;flex-direction:column;gap:8px}
        .toast{padding:12px 20px;border-radius:12px;color:#fff;font-weight:600;animation:slideIn .3s}
        .toast-success{background:#27ae60}
        .toast-error{background:#e74c3c}
        
        @keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
        .hidden{display:none!important}
        .loading{text-align:center;padding:50px}
        .spinner{width:40px;height:40px;border:4px solid #e0e0e0;border-top-color:var(--primary);border-radius:50%;animation:spin .8s infinite;margin:auto}
        @keyframes spin{to{transform:rotate(360deg)}}
    </style>
</head>
<body>
    <header class="header">
        <div class="logo" onclick="showHome()">
            <div class="logo-icon">SZ</div>
            SOGE ZABANA RH
        </div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
            <button onclick="toggleTheme()" class="btn btn-outline">🌓</button>
            <button onclick="openAddAd()" class="btn btn-primary" id="btnAddAd">➕ Déposer une annonce</button>
            <button onclick="openLogin()" class="btn btn-outline" id="btnLogin">👤 Connexion</button>
            <button onclick="logout()" class="btn btn-danger hidden" id="btnLogout">🚪 Déconnexion</button>
        </div>
    </header>

    <div class="hero">
        <h1>🔍 Trouvez tout près de chez vous</h1>
        <p>Immobilier • Véhicules • Emploi • Services • Pôle Urbain Ahmed Zabana</p>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Que recherchez-vous ?">
            <select id="searchCategory"></select>
            <button onclick="searchAds()">🔍 Rechercher</button>
        </div>
    </div>

    <div class="container">
        <div class="tabs">
            <div class="tab active" onclick="loadAds()">🕐 Toutes</div>
            <div class="tab" onclick="showFavorites()">❤️ Favoris</div>
            <div class="tab" onclick="showMyAds()">📋 Mes annonces</div>
        </div>
        <div id="adsContainer" class="ads-grid"></div>
    </div>

    <!-- Modals -->
    <div class="modal" id="loginModal">
        <div class="modal-content">
            <h3>🔐 Connexion</h3>
            <input type="email" id="loginEmail" placeholder="Email" style="width:100%;padding:12px;margin:10px 0">
            <input type="password" id="loginPassword" placeholder="Mot de passe" style="width:100%;padding:12px;margin:10px 0">
            <button class="btn btn-primary" onclick="login()" style="width:100%;padding:14px">Se connecter</button>
            <p style="text-align:center;margin-top:15px">Pas de compte ? <a href="#" onclick="openRegister()">S'inscrire</a></p>
        </div>
    </div>

    <div class="modal" id="registerModal">
        <div class="modal-content">
            <h3>📝 Inscription</h3>
            <input type="text" id="regNom" placeholder="Nom complet" style="width:100%;padding:12px;margin:8px 0">
            <input type="email" id="regEmail" placeholder="Email" style="width:100%;padding:12px;margin:8px 0">
            <input type="tel" id="regPhone" placeholder="Téléphone" style="width:100%;padding:12px;margin:8px 0">
            <input type="password" id="regPassword" placeholder="Mot de passe" style="width:100%;padding:12px;margin:8px 0">
            <button class="btn btn-primary" onclick="register()" style="width:100%;padding:14px">S'inscrire</button>
        </div>
    </div>

    <div class="modal" id="addAdModal">
        <div class="modal-content">
            <h3>📢 Nouvelle Annonce</h3>
            <select id="adCategorie" style="width:100%;padding:12px;margin:8px 0"></select>
            <input type="text" id="adTitre" placeholder="Titre de l'annonce" style="width:100%;padding:12px;margin:8px 0">
            <textarea id="adDescription" rows="4" placeholder="Description..." style="width:100%;padding:12px;margin:8px 0"></textarea>
            <input type="number" id="adPrix" placeholder="Prix (DA)" style="width:100%;padding:12px;margin:8px 0">
            <input type="tel" id="adPhone" placeholder="Téléphone" style="width:100%;padding:12px;margin:8px 0">
            <input type="file" id="adPhoto" accept="image/*" onchange="previewImage()">
            <div id="imagePreview" style="margin-top:10px"></div>
            <button class="btn btn-primary" onclick="createAd()" style="width:100%;padding:14px;margin-top:15px">Publier l'annonce</button>
        </div>
    </div>

    <div class="modal" id="adDetailModal">
        <div class="modal-content" id="adDetailContent"></div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        // ================= CONFIG =================
        const API_URL = 'https://script.google.com/macros/s/AKfycbxyFP_p6kBfDrCdQUd_SVbDsT3zGoxhkwelHt_owWWnw3fH73PpMSQzrENRf8AivApE/exec'; // ← Change avec ton URL réelle
        
        const CATS = [
            {id:'Immobilier', fr:'Immobilier'},
            {id:'Véhicules', fr:'Véhicules'},
            {id:'Emploi', fr:'Emploi'},
            {id:'Services', fr:'Services'},
            {id:'Santé', fr:'Santé'},
            {id:'Commerce', fr:'Commerce'},
            {id:'Divers', fr:'Divers'}
        ];

        let U = JSON.parse(localStorage.getItem('su')) || null;
        let A = [];
        let F = JSON.parse(localStorage.getItem('sf')) || [];
        let selectedFile = null;

        // ================= API =================
        async function api(action, params = {}, method = 'GET') {
            try {
                if (method === 'POST') {
                    const res = await fetch(API_URL, {
                        method: 'POST',
                        body: JSON.stringify({action, ...params})
                    });
                    return await res.json();
                } else {
                    const url = new URL(API_URL);
                    url.searchParams.append('action', action);
                    Object.keys(params).forEach(k => url.searchParams.append(k, params[k]));
                    const res = await fetch(url);
                    return await res.json();
                }
            } catch (e) {
                console.error(e);
                return null;
            }
        }

        function showToast(msg, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.textContent = msg;
            document.getElementById('toastContainer').appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }

        // ================= INIT =================
        document.addEventListener('DOMContentLoaded', () => {
            loadCats();
            loadAds();
            updateUI();
        });

        function loadCats() {
            const selects = ['adCategorie', 'searchCategory'];
            selects.forEach(id => {
                const sel = document.getElementById(id);
                sel.innerHTML = '<option value="">Toutes catégories</option>';
                CATS.forEach(c => {
                    const opt = document.createElement('option');
                    opt.value = c.id;
                    opt.textContent = c.fr;
                    sel.appendChild(opt);
                });
            });
        }

        // ================= ADS =================
        async function loadAds() {
            document.getElementById('adsContainer').innerHTML = '<div class="loading"><div class="spinner"></div></div>';
            const res = await api('getAds');
            A = Array.isArray(res) ? res : [];
            displayAds(A);
        }

        function displayAds(ads) {
            const container = document.getElementById('adsContainer');
            if (!ads.length) {
                container.innerHTML = '<div style="text-align:center;padding:50px;color:#666">Aucune annonce trouvée</div>';
                return;
            }
            container.innerHTML = ads.map(ad => {
                const price = Number(ad.Prix) || 0;
                const isFav = F.includes(String(ad.ID));
                let img = ad.Photos ? `<img src="${ad.Photos.split(',')[0]}" onerror="this.style.display='none'">` : '<span style="font-size:50px">📦</span>';
                
                return `
                <div class="ad-card" onclick="showDetail('${ad.ID}')">
                    <button class="fav-btn" onclick="event.stopPropagation();toggleFav('${ad.ID}')">${isFav ? '❤️' : '🤍'}</button>
                    <div class="ad-image">${img}</div>
                    <div style="padding:12px">
                        <div style="font-weight:700">${ad.Titre || 'Sans titre'}</div>
                        <div style="color:var(--primary);font-size:18px;font-weight:800">${price > 0 ? price.toLocaleString('fr-DZ') + ' DA' : 'Gratuit'}</div>
                        <div style="font-size:12px;color:#666">${ad.GPS || 'Misserghine'}</div>
                    </div>
                </div>`;
            }).join('');
        }

        async function showDetail(id) {
            const ad = A.find(a => a.ID === id);
            if (!ad) return;
            
            await api('incrementViews', {adID: id});

            let html = `
                <h3>${ad.Titre}</h3>
                ${ad.Photos ? `<img src="${ad.Photos.split(',')[0]}" style="width:100%;border-radius:12px">` : ''}
                <p style="font-size:28px;color:var(--primary);margin:15px 0">${Number(ad.Prix).toLocaleString('fr-DZ')} DA</p>
                <p><strong>Description :</strong> ${ad.Description || 'Aucune'}</p>
                <p><strong>Téléphone :</strong> <a href="tel:${ad.Phone}">${ad.Phone}</a></p>
                <button class="btn btn-danger" onclick="closeModal('adDetailModal')" style="width:100%">Fermer</button>
            `;
            document.getElementById('adDetailContent').innerHTML = html;
            document.getElementById('adDetailModal').classList.add('active');
        }

        // ================= CREATE AD =================
        async function createAd() {
            if (!U) return openLogin();
            
            const data = {
                userID: U.ID,
                categorie: document.getElementById('adCategorie').value,
                titre: document.getElementById('adTitre').value,
                description: document.getElementById('adDescription').value,
                prix: document.getElementById('adPrix').value,
                phone: document.getElementById('adPhone').value,
                photos: ''
            };

            if (!data.categorie || !data.titre) {
                showToast('Titre et catégorie obligatoires', 'error');
                return;
            }

            if (selectedFile) {
                const reader = new FileReader();
                reader.onload = async () => {
                    const upload = await api('uploadImage', {image: reader.result}, 'POST');
                    if (upload?.success) data.photos = upload.url;
                    await sendAd(data);
                };
                reader.readAsDataURL(selectedFile);
            } else {
                await sendAd(data);
            }
        }

        async function sendAd(data) {
            const res = await api('createAd', data, 'POST');
            if (res?.success) {
                showToast('Annonce publiée avec succès !', 'success');
                closeModal('addAdModal');
                loadAds();
            } else {
                showToast('Erreur lors de la publication', 'error');
            }
        }

        function previewImage() {
            const file = document.getElementById('adPhoto').files[0];
            if (file) {
                selectedFile = file;
                const reader = new FileReader();
                reader.onload = e => document.getElementById('imagePreview').innerHTML = `<img src="${e.target.result}" style="max-width:150px">`;
                reader.readAsDataURL(file);
            }
        }

        // ================= FAVORIS & AUTRES =================
        async function toggleFav(id) {
            if (!U) return showToast('Connectez-vous', 'error');
            const res = await api('toggleFavorite', {userID: U.ID, adID: id}, 'POST');
            if (res?.success) {
                if (res.action === 'added') F.push(id);
                else F = F.filter(x => x !== id);
                localStorage.setItem('sf', JSON.stringify(F));
                displayAds(A);
            }
        }

        async function showFavorites() {
            if (!U) return showToast('Connectez-vous', 'error');
            const res = await api('getFavorites', {userID: U.ID});
            A = Array.isArray(res) ? res : [];
            displayAds(A);
        }

        async function showMyAds() {
            if (!U) return showToast('Connectez-vous', 'error');
            const res = await api('getUserAds', {userID: U.ID});
            A = Array.isArray(res) ? res : [];
            displayAds(A);
        }

        function searchAds() {
            const query = document.getElementById('searchInput').value.trim();
            api('searchAds', {query}).then(res => {
                A = Array.isArray(res) ? res : [];
                displayAds(A);
            });
        }

        // ================= AUTH =================
        function login() {
            const email = document.getElementById('loginEmail').value.trim();
            const pass = document.getElementById('loginPassword').value;
            api('login', {email, password: pass}).then(r => {
                if (r?.success) {
                    U = r.user;
                    localStorage.setItem('su', JSON.stringify(U));
                    closeModal('loginModal');
                    updateUI();
                    showToast('Connexion réussie', 'success');
                    loadAds();
                } else {
                    showToast(r?.error || 'Erreur', 'error');
                }
            });
        }

        function register() {
            const nom = document.getElementById('regNom').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const phone = document.getElementById('regPhone').value.trim();
            const pass = document.getElementById('regPassword').value;
            
            api('register', {nom, email, phone, password: pass}).then(r => {
                if (r?.success) {
                    showToast('Compte créé !', 'success');
                    closeModal('registerModal');
                    openLogin();
                } else {
                    showToast(r?.error || 'Erreur', 'error');
                }
            });
        }

        function logout() {
            U = null;
            localStorage.removeItem('su');
            updateUI();
            showToast('Déconnecté', 'info');
            loadAds();
        }

        function updateUI() {
            document.getElementById('btnLogin').classList.toggle('hidden', !!U);
            document.getElementById('btnLogout').classList.toggle('hidden', !U);
            document.getElementById('btnAddAd').style.display = U ? 'inline-flex' : 'none';
        }

        function openLogin() { document.getElementById('loginModal').classList.add('active'); }
        function openRegister() { document.getElementById('registerModal').classList.add('active'); }
        function openAddAd() { 
            if (!U) return openLogin();
            document.getElementById('addAdModal').classList.add('active'); 
        }
        function showHome() { loadAds(); }
        function toggleTheme() {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
        }
    </script>
</body>
</html>
